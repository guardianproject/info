<section class="bg-primary py-16 xl:py-24">
  <div class="container mx-auto px-4 text-center">
    {{ with .title }}
      <h2 class="mb-6 text-4xl font-bold text-white xl:text-5xl">{{ . }}</h2>
    {{ end }}
    {{ with .text }}
      <p class="mx-auto mb-10 max-w-2xl text-lg text-white/80">{{ . }}</p>
    {{ end }}
    {{ if .buttons }}
      <div class="flex flex-col items-center justify-center gap-4 sm:flex-row sm:gap-6">
        {{ range $i, $e := .buttons }}
          {{ if (eq $i 0) }}
            <a class="rounded-lg bg-white px-8 py-3 text-lg font-medium text-primary hover:bg-white/90 duration-300" href="{{ .url }}">
              {{ .label }}
            </a>
          {{ else }}
            <a class="rounded-lg border-2 border-white px-8 py-3 text-lg font-medium text-white hover:bg-white/10 duration-300" href="{{ .url }}">
              {{ .label }}
            </a>
          {{ end }}
        {{ end }}
      </div>
    {{ end }}
  </div>
</section>
